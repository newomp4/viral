<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Viral — @newomp4</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="stage">
      <canvas id="view"></canvas>
      <div id="chrome">
        <div id="title">
          <span class="brand">VIRAL</span>
          <span class="by">by @newomp4</span>
          <a id="studio-link" href="http://127.0.0.1:5170/">← studio</a>
        </div>
        <div id="counter">
          <div class="counter-row"><span class="label">views</span><span class="value" id="count-views">0</span></div>
          <div class="counter-row"><span class="label">active</span><span class="value" id="count-active">0</span></div>
          <div class="counter-row"><span class="label">peak</span><span class="value" id="count-peak">0</span></div>
        </div>
        <div id="hint">drag to orbit · scroll to zoom · space to ignite · X to randomize</div>
        <div id="rec-indicator" class="hidden">REC</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
